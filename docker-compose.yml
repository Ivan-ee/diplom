services:
  postgres:
    image: postgres:18
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bakery}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./docker-volumes/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bakery

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - ./docker-volumes/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bakery

  minio-init:
    image: minio/mc
    environment:
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_PRODUCTS: ${MINIO_BUCKET_PRODUCTS:-products}
      MINIO_BUCKET_TEXTURES: ${MINIO_BUCKET_TEXTURES:-textures}
      MINIO_BUCKET_SCREENSHOTS: ${MINIO_BUCKET_SCREENSHOTS:-screenshots}
      MINIO_BUCKET_MODELS: ${MINIO_BUCKET_MODELS:-models}
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://$${MINIO_ENDPOINT}:$${MINIO_PORT} $${MINIO_ACCESS_KEY} $${MINIO_SECRET_KEY};
      mc mb --ignore-existing local/$${MINIO_BUCKET_PRODUCTS};
      mc mb --ignore-existing local/$${MINIO_BUCKET_TEXTURES};
      mc mb --ignore-existing local/$${MINIO_BUCKET_SCREENSHOTS};
      mc mb --ignore-existing local/$${MINIO_BUCKET_MODELS};
      mc anonymous set download local/$${MINIO_BUCKET_PRODUCTS};
      mc anonymous set download local/$${MINIO_BUCKET_TEXTURES};
      mc anonymous set download local/$${MINIO_BUCKET_SCREENSHOTS};
      mc anonymous set download local/$${MINIO_BUCKET_MODELS};
      echo 'Buckets created and policies set';
      "
    networks:
      - bakery

  meilisearch:
    image: getmeili/meilisearch:v1.14
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-devMasterKey123}
      MEILI_ENV: development
    volumes:
      - ./docker-volumes/meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - bakery

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bakery}
      JWT_SECRET: ${JWT_SECRET:-super-secret-dev-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_PRODUCTS: ${MINIO_BUCKET_PRODUCTS:-products}
      MINIO_BUCKET_TEXTURES: ${MINIO_BUCKET_TEXTURES:-textures}
      MINIO_BUCKET_SCREENSHOTS: ${MINIO_BUCKET_SCREENSHOTS:-screenshots}
      MINIO_BUCKET_MODELS: ${MINIO_BUCKET_MODELS:-models}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-devMasterKey123}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://localhost:4000/api/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bakery

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:4000
        NEXT_PUBLIC_MINIO_URL: ${NEXT_PUBLIC_MINIO_URL:-http://localhost:9000}
        NEXT_PUBLIC_CONSTRUCTOR_MODELS_BASE_URL: ${NEXT_PUBLIC_CONSTRUCTOR_MODELS_BASE_URL:-http://localhost:9000/models}
        NEXT_IMAGE_UNOPTIMIZED: ${NEXT_IMAGE_UNOPTIMIZED:-true}
    env_file:
      - .env
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
      NEXT_PUBLIC_MINIO_URL: ${NEXT_PUBLIC_MINIO_URL:-http://localhost:9000}
      NEXT_PUBLIC_CONSTRUCTOR_MODELS_BASE_URL: ${NEXT_PUBLIC_CONSTRUCTOR_MODELS_BASE_URL:-http://localhost:9000/models}
      NEXT_IMAGE_UNOPTIMIZED: ${NEXT_IMAGE_UNOPTIMIZED:-true}
    depends_on:
      api:
        condition: service_healthy
    networks:
      - bakery

  seed:
    profiles:
      - seed
    build:
      context: .
      dockerfile: packages/db/Dockerfile.seed
    working_dir: /app
    env_file:
      - .env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-bakery}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET_PRODUCTS: ${MINIO_BUCKET_PRODUCTS:-products}
      MINIO_BUCKET_TEXTURES: ${MINIO_BUCKET_TEXTURES:-textures}
      MINIO_BUCKET_SCREENSHOTS: ${MINIO_BUCKET_SCREENSHOTS:-screenshots}
      MINIO_BUCKET_MODELS: ${MINIO_BUCKET_MODELS:-models}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-devMasterKey123}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      meilisearch:
        condition: service_healthy
    networks:
      - bakery

networks:
  bakery:
    driver: bridge
