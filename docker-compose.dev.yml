services:
  postgres:
    image: postgres:18
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: bakery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./docker-volumes/pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - ./docker-volumes/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/products;
      mc mb --ignore-existing local/textures;
      mc mb --ignore-existing local/screenshots;
      mc mb --ignore-existing local/models;
      mc anonymous set download local/products;
      mc anonymous set download local/textures;
      mc anonymous set download local/models;
      echo 'Buckets created and policies set';
      "

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bakery
      MINIO_ENDPOINT: minio
      FRONTEND_URL: http://localhost:3000
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:4000
        NEXT_PUBLIC_MINIO_URL: http://minio:9000
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file: .env
    restart: unless-stopped
